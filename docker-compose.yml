services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/seed:/data/seed:ro
    environment:
      - LINKQ_SECRET_KEY=linkq-docker-secret-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
