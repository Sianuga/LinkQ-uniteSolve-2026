# ============================================================================
# Nexus Deploy — S3/CloudFront (frontend) + EC2/ECR (backend)
# ============================================================================
# Trigger: push to main, or manual dispatch.
#
# Required GitHub repository secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION,
#   EC2_HOST, EC2_SSH_KEY, ECR_URL, S3_BUCKET, CLOUDFRONT_DIST_ID
# ============================================================================

name: Deploy

on:
  workflow_dispatch: # Manual trigger only — auto-deploy disabled for now

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Frontend → S3 + CloudFront
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npx vite build
        working-directory: frontend
        env:
          VITE_API_URL: http://${{ secrets.EC2_HOST }}:8000

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"

  # ─────────────────────────────────────────────────────────────
  # Backend → ECR + EC2
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -f Dockerfile.deploy -t ${{ secrets.ECR_URL }}:latest .
          docker push ${{ secrets.ECR_URL }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: /home/ec2-user/deploy.sh
